<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 220" font-family="Cascadia Code, Consolas, monospace" font-size="11">
  <style>
    .wick { stroke: #d1d5db; stroke-width: 1.5; }
    .body-up { fill: #00ff88; stroke: #00ff88; }
    .body-down { fill: #ff4455; stroke: #ff4455; }
    .label { fill: #d1d5db; }
    .arrow { stroke: #4488ff; stroke-width: 1; fill: none; }
    .dim { fill: #6b7280; }
  </style>
  <!-- Bullish (green) candle -->
  <line class="wick" x1="120" y1="20" x2="120" y2="200"/>
  <rect class="body-up" x="111" y="60" width="18" height="100"/>

  <!-- Labels with arrows pointing to features -->
  <line class="arrow" x1="135" y1="30" x2="170" y2="30"/>
  <text class="label" x="174" y="34">upper wick (high)</text>

  <line class="arrow" x1="135" y1="110" x2="170" y2="110"/>
  <text class="label" x="174" y="114">body (open → close)</text>
  <text class="dim" x="174" y="128">green = close &gt; open</text>

  <line class="arrow" x1="135" y1="190" x2="170" y2="190"/>
  <text class="label" x="174" y="194">lower wick (low)</text>

  <!-- Bearish (red) candle for contrast -->
  <line class="wick" x1="380" y1="40" x2="380" y2="180"/>
  <rect class="body-down" x="371" y="70" width="18" height="80"/>
  <text class="dim" x="345" y="200" text-anchor="middle">red = close &lt; open</text>
</svg>
