<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 220" font-family="Cascadia Code, Consolas, monospace" font-size="11">
  <style>
    .wick { stroke: #d1d5db; stroke-width: 1.5; }
    .body-up { fill: #00ff88; stroke: #00ff88; }
    .body-down { fill: #ff4455; stroke: #ff4455; }
    .label { fill: #d1d5db; }
    .dim { fill: #6b7280; }
  </style>
  <!-- Bar 1: small red -->
  <line class="wick" x1="150" y1="65" x2="150" y2="135"/>
  <rect class="body-down" x="141" y="80" width="18" height="40"/>
  <text class="dim" x="150" y="160" text-anchor="middle">prior red bar</text>

  <!-- Bar 2: big green that engulfs bar 1's body -->
  <line class="wick" x1="280" y1="40" x2="280" y2="180"/>
  <rect class="body-up" x="271" y="60" width="18" height="100"/>
  <text class="label" x="280" y="200" text-anchor="middle">bullish engulfing</text>

  <!-- Reference lines showing engulfing -->
  <line x1="155" y1="80" x2="270" y2="80" stroke="#4488ff" stroke-width="0.5" stroke-dasharray="3,2"/>
  <line x1="155" y1="120" x2="270" y2="120" stroke="#4488ff" stroke-width="0.5" stroke-dasharray="3,2"/>
</svg>
