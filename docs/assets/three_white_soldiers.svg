<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 220" font-family="Cascadia Code, Consolas, monospace" font-size="11">
  <style>
    .wick { stroke: #d1d5db; stroke-width: 1.5; }
    .body-up { fill: #00ff88; stroke: #00ff88; }
    .label { fill: #d1d5db; }
    .dim { fill: #6b7280; }
    .ref { stroke: #4488ff; stroke-width: 0.5; stroke-dasharray: 3,2; }
  </style>
  <!-- 3 consecutive green candles, each higher -->
  <line class="wick" x1="130" y1="140" x2="130" y2="190"/>
  <rect class="body-up" x="121" y="145" width="18" height="40"/>

  <line class="wick" x1="220" y1="95" x2="220" y2="155"/>
  <rect class="body-up" x="211" y="100" width="18" height="50"/>

  <line class="wick" x1="310" y1="40" x2="310" y2="120"/>
  <rect class="body-up" x="301" y="50" width="18" height="60"/>

  <!-- Ascending arrow showing trend -->
  <path d="M 110 195 L 330 50" stroke="#4488ff" stroke-width="1" fill="none" stroke-dasharray="4,3"/>

  <text class="dim" x="130" y="210" text-anchor="middle">bar 1</text>
  <text class="dim" x="220" y="210" text-anchor="middle">bar 2</text>
  <text class="dim" x="310" y="210" text-anchor="middle">bar 3</text>
  <text class="label" x="360" y="55">higher</text>
  <text class="label" x="360" y="68">closes</text>
</svg>
