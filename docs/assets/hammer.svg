<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 220" font-family="Cascadia Code, Consolas, monospace" font-size="11">
  <style>
    .wick { stroke: #d1d5db; stroke-width: 1.5; }
    .body-up { fill: #00ff88; stroke: #00ff88; }
    .body-down { fill: #ff4455; stroke: #ff4455; }
    .label { fill: #d1d5db; }
    .dim { fill: #6b7280; }
    .annot { fill: #4488ff; }
  </style>
  <!-- Hammer: small body at top, long lower wick -->
  <line class="wick" x1="180" y1="40" x2="180" y2="180"/>
  <rect class="body-up" x="171" y="40" width="18" height="30"/>

  <!-- Labels -->
  <line x1="195" y1="55" x2="240" y2="55" stroke="#4488ff" stroke-width="1"/>
  <text class="label" x="244" y="59">small body at top</text>

  <line x1="195" y1="170" x2="240" y2="170" stroke="#4488ff" stroke-width="1"/>
  <text class="label" x="244" y="174">long lower wick</text>
  <text class="dim" x="244" y="188">≥ 2× body length</text>

  <text class="annot" x="180" y="208" text-anchor="middle">price probed lower, rejected</text>
</svg>
