<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 220" font-family="Cascadia Code, Consolas, monospace" font-size="11">
  <style>
    .wick { stroke: #d1d5db; stroke-width: 1.5; }
    .body-up { fill: #00ff88; stroke: #00ff88; }
    .body-down { fill: #ff4455; stroke: #ff4455; }
    .body-doji { fill: #6b7280; stroke: #d1d5db; stroke-width: 1; }
    .label { fill: #d1d5db; }
    .dim { fill: #6b7280; }
    .ref { stroke: #4488ff; stroke-width: 0.5; stroke-dasharray: 3,2; }
  </style>
  <!-- Bar 1: big red -->
  <line class="wick" x1="110" y1="40" x2="110" y2="160"/>
  <rect class="body-down" x="101" y="50" width="18" height="100"/>
  <text class="dim" x="110" y="195" text-anchor="middle">1 · big red</text>

  <!-- Bar 2: small doji (gapped down) -->
  <line class="wick" x1="220" y1="155" x2="220" y2="180"/>
  <rect class="body-doji" x="213" y="165" width="14" height="6"/>
  <text class="dim" x="220" y="200" text-anchor="middle">2 · indecision</text>

  <!-- Bar 3: big green closing above bar 1 midpoint -->
  <line class="wick" x1="330" y1="55" x2="330" y2="165"/>
  <rect class="body-up" x="321" y="70" width="18" height="80"/>
  <text class="dim" x="330" y="195" text-anchor="middle">3 · big green</text>

  <!-- Reference: bar 1 midpoint line -->
  <line class="ref" x1="90" y1="100" x2="350" y2="100"/>
  <text class="dim" x="358" y="103">bar 1 midpoint</text>
</svg>
