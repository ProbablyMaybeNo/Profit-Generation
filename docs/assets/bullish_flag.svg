<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 220" font-family="Cascadia Code, Consolas, monospace" font-size="11">
  <style>
    .wick { stroke: #d1d5db; stroke-width: 1; }
    .body-up { fill: #00ff88; stroke: #00ff88; }
    .body-down { fill: #ff4455; stroke: #ff4455; }
    .label { fill: #d1d5db; }
    .dim { fill: #6b7280; }
    .annot { stroke: #4488ff; stroke-width: 1; fill: none; }
  </style>
  <!-- POLE: 3 strong green candles up -->
  <line class="wick" x1="40" y1="155" x2="40" y2="200"/>
  <rect class="body-up" x="34" y="160" width="12" height="35"/>

  <line class="wick" x1="65" y1="115" x2="65" y2="170"/>
  <rect class="body-up" x="59" y="120" width="12" height="45"/>

  <line class="wick" x1="90" y1="75" x2="90" y2="130"/>
  <rect class="body-up" x="84" y="80" width="12" height="45"/>

  <!-- FLAG: 4-5 small candles drifting slightly down -->
  <line class="wick" x1="125" y1="70" x2="125" y2="100"/>
  <rect class="body-down" x="119" y="78" width="12" height="14"/>

  <line class="wick" x1="150" y1="75" x2="150" y2="105"/>
  <rect class="body-up" x="144" y="83" width="12" height="12"/>

  <line class="wick" x1="175" y1="80" x2="175" y2="110"/>
  <rect class="body-down" x="169" y="88" width="12" height="14"/>

  <line class="wick" x1="200" y1="85" x2="200" y2="115"/>
  <rect class="body-down" x="194" y="93" width="12" height="12"/>

  <!-- BREAKOUT: green candles continuing up -->
  <line class="wick" x1="235" y1="55" x2="235" y2="110"/>
  <rect class="body-up" x="229" y="60" width="12" height="45"/>

  <line class="wick" x1="260" y1="20" x2="260" y2="75"/>
  <rect class="body-up" x="254" y="25" width="12" height="45"/>

  <!-- Annotations -->
  <line class="annot" x1="30" y1="205" x2="100" y2="205"/>
  <text class="dim" x="65" y="218" text-anchor="middle">pole (rally)</text>

  <line class="annot" x1="115" y1="120" x2="210" y2="120"/>
  <text class="dim" x="162" y="135" text-anchor="middle">flag (pullback)</text>

  <line class="annot" x1="225" y1="30" x2="275" y2="30"/>
  <text class="dim" x="290" y="34">breakout</text>
</svg>
